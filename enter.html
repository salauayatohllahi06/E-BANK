<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CS Banking Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  color:#fff;
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#533483);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Glow Effects */
.glow{
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  filter:blur(140px);
  opacity:.4;
  z-index:0;
}
.glow1{background:#00f2fe; top:10%; left:5%;}
.glow2{background:#ff00cc; bottom:10%; right:5%;}

/* Floating particles */
.particle{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  opacity:.4;
  animation:float 25s linear infinite;
}
@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-100vh);}
}

/* Glass Header */
header{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.08);
  padding:35px 20px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.2);
  position:relative;
  z-index:2;
}

.logo{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:1rem;
}

.logo img{
  height:50px;
  width:50px;
}

.dashboard-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
  padding:40px 20px;
  position:relative;
  z-index:2;
}

/* Glass Cards */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  padding:25px;
  border-radius:18px;
  transition:.4s ease;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

.card h2{
  margin-bottom:15px;
  font-weight:600;
  letter-spacing:1px;
}

/* Inputs */
.card input{
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

.card input::placeholder{
  color:#ddd;
}

.card input:focus{
  box-shadow:0 0 12px #00f2fe;
}

/* Buttons */
.card button{
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  color:#fff;
  background:linear-gradient(45deg,#ff00cc,#3333ff);
  transition:.4s;
  box-shadow:0 0 15px rgba(255,0,204,.6);
}

.card button:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px rgba(255,0,204,1);
}

.view-profile-btn{
  display:inline-block;
  margin-top:15px;
  padding:8px 18px;
  border-radius:25px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  text-decoration:none;
  color:white;
  transition:.3s;
}

.view-profile-btn:hover{
  transform:scale(1.05);
}

.extra-services .button-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 10px;
}

.extra-services .button-group a {
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  background: linear-gradient(45deg, #43a047, #2e7d32);
  color: white;
  padding: 12px;
  border-radius: 25px;
  transition: 0.3s ease;
  font-weight: 500;
  text-align: center;
}

.extra-services .button-group a:hover {
  transform: scale(1.05);
}
.eye{
  cursor:pointer;
  margin-left:8px;
}

footer{
  text-align:center;
  padding:25px;
  background:rgba(255,255,255,0.05);
  margin-top:40px;
  border-top:1px solid rgba(255,255,255,0.2);
}

/* Responsive */
@media(max-width:600px){
  .dashboard-container{padding:20px 10px;}
}

  </style>
</head>
<body>

  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <header>
    <div class="logo">
    <img src="3135715.png" alt="CS Bank Logo">
    <h1>CS BANKING DASHBOARD</h1>
    </div>
    </header>
    
    <p style="text-align:center; font-size:20px; margin-top:15px;">Welcome back, User 👋</p>
    
    <main class="dashboard-container">
    <section class="account-info card">
  <h2>Account Overview</h2>
  <p><strong>Account Number:</strong> 7********9</p>
  <p><strong>Balance:</strong> ₦500,000.00 <span class="eye" data-hidden="false" onclick="toggleBalance(this)">👁️</span></p>
  <a href="profile.html" class="view-profile-btn">View Profile</a>
</section>

    <section class="card">
      <h2>Transfer Money</h2>
      <form onsubmit="generateReceipt(event, 'transfer')">
        <input type="text" name="bank" placeholder="Bank Name" required>
        <input type="text" name="recipient" placeholder="Recipient Name" required>
        <input type="tel" name="account" placeholder="Recipient Account Number" required>
        <input type="text" name="desc" placeholder="Purpose of Transfer" required>
        <input type="number" name="amount" placeholder="Amount (₦)" required>
        <input type="password" name="pin" placeholder="Transaction PIN" required maxlength="4" title="Enter 4-digit PIN">
        <button type="submit">Send</button>
        <div class="receipt" id="transferReceipt"></div>
      </form>
    </section>

    <section class="card">
  <h2>Add Funds</h2>
  <form onsubmit="generateReceipt(event, 'withdraw')">
    <input type="number" name="amount" placeholder="Amount to Add (₦)" required>
    <input type="text" name="source" placeholder="Funding Source (e.g., Cash, Transfer)" required>
    <input type="text" name="depositor" placeholder="Depositor Name" required>
    <input type="tel" name="phone" placeholder="Depositor Phone Number" pattern="[0-9]{11}" required title="Enter 11-digit phone number">
    <input type="date" name="date" value="" required>
    <input type="password" name="pin" placeholder="Transaction PIN" required maxlength="4" title="Enter 4-digit PIN">
    <button type="submit">Add Funds</button>
    <div class="receipt" id="withdrawReceipt"></div>
  </form>
</section>

    <section class="card">
      <h2>Buy Airtime</h2>
      <form onsubmit="generateReceipt(event, 'airtime')">
        <input type="tel" name="number" placeholder="Phone Number" required>
        <input type="text" name="network" placeholder="Network Provider" required>
        <input type="number" name="amount" placeholder="Amount (₦)" required>
        <input type="password" name="pin" placeholder="Transaction PIN" required maxlength="4" title="Enter 4-digit PIN">
        <button type="submit">Buy Airtime</button>
        <div class="receipt" id="airtimeReceipt"></div>
      </form>
    </section>

    <section class="card extra-services">
      <h2>Other Services</h2>
      <div class="button-group">
        <a href="pay bills.html">Pay Bills</a>
        <a href="transfer.html">View Transactions</a>
        <a href="profile.html">Account Profile</a>
        <a href="settings.html">Settings</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 CS BANKING SERVICES. All rights reserved.</p>
  </footer>

<script>

for(let i=0;i<50;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.top=Math.random()*100+"vh";
  p.style.animationDuration=(15+Math.random()*20)+"s";
  document.body.appendChild(p);
}

  let currentBalance = 500000;

  function toggleBalance(icon) {
    const balanceSpan = icon.closest("p");
    const isHidden = icon.getAttribute("data-hidden") === "true";
    balanceSpan.innerHTML = isHidden
      ? `<strong>Balance:</strong> ₦${currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2})} <span class="eye" data-hidden="false" onclick="toggleBalance(this)">👁️</span>`
      : `<strong>Balance:</strong> ₦********* <span class="eye" data-hidden="true" onclick="toggleBalance(this)">🙈</span>`;
  }

  function updateBalanceDisplay() {
    const balanceParagraph = document.querySelector('.account-info p:nth-child(3)');
    if (balanceParagraph) {
      balanceParagraph.innerHTML = `<strong>Balance:</strong> ₦${currentBalance.toLocaleString(undefined, {minimumFractionDigits: 2})} <span class="eye" data-hidden="false" onclick="toggleBalance(this)">👁</span>`;
    }
  }

  window.onload = () => {
    updateBalanceDisplay();
    const dateInput = document.querySelector('input[name="date"]');
    if (dateInput) {
      const today = new Date().toISOString().split("T")[0];
      dateInput.value = today;
    }
  };

  function generateReceipt(event, type) {
    event.preventDefault();
    const form = event.target;
    const data = new FormData(form);
    const entries = Object.fromEntries(data.entries());
    const amount = parseFloat(entries.amount);
    delete entries.pin;

    if (type === "transfer") {
      if (amount > currentBalance) {
        alert("Insufficient balance!");
        return;
      }
      currentBalance -= amount;
    } else if (type === "withdraw") {
      currentBalance += amount;
    }

    updateBalanceDisplay();
    const now = new Date();
    const record = {
      type,
      amount,
      date: now.toLocaleString(),
      details: entries
    };
    const prev = JSON.parse(localStorage.getItem('csbank_transactions')) || [];
    prev.push(record);
    localStorage.setItem('csbank_transactions', JSON.stringify(prev));

    const receiptDiv = document.createElement('div');
    receiptDiv.style.cssText = `
      padding: 20px;
      width: 320px;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #ffffff);
      color: #003366;
      border: 2px solid #00838f;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      text-align: left;
    `;
    receiptDiv.innerHTML = `
      <h3 style="text-align:center; color: #006064;">✨ CS BANK ✨</h3>
      <p style="text-align:center; font-style: italic;">Transaction Receipt</p>
      <hr style="border-color:#00838f;"/>
      <p><strong>Type:</strong> ${type.toUpperCase()}</p>
      <p><strong>Date:</strong> ${now.toLocaleDateString()} ${now.toLocaleTimeString()}</p>
      ${Object.entries(entries).map(([key, val]) => `<p><strong>${formatKey(key)}:</strong> ${val}</p>`).join('')}
      <hr style="border-color:#00838f;"/>
      <p style="text-align:center;">✅ Thank you for banking with us!</p>
    `;

    document.body.appendChild(receiptDiv);
    html2canvas(receiptDiv).then(canvas => {
      const imageData = canvas.toDataURL("image/png");
      const receiptContainer = document.getElementById(`${type}Receipt`);
      receiptContainer.innerHTML = `
        <img src="${imageData}" style="width:100%; border-radius: 6px; border: 2px solid #00838f;" />
        <a class="download-link" href="${imageData}" download="receipt_${type}_${now.getTime()}.png">Download Receipt</a>
      `;
      document.body.removeChild(receiptDiv);
    });
  }

  function formatKey(key) {
    return key.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
  }
</script>
</body>
</html>

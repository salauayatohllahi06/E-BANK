<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - CS BANK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  color:#fff;
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* Animated Gradient */
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Glow Effects */
.glow{
  position:absolute;
  width:350px;
  height:350px;
  border-radius:50%;
  filter:blur(140px);
  opacity:.4;
  z-index:0;
}

.glow1{
  background:#00f2fe;
  top:10%;
  left:5%;
}

.glow2{
  background:#ff00cc;
  bottom:10%;
  right:5%;
}

/* Glass Header */
header{
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.08);
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.2);
  position:relative;
  z-index:2;
}

.logo{
  display:flex;
  align-items:center;
  gap:1em;
}

.logo img{
  height:50px;
  width:50px;
}

nav ul{
  list-style:none;
  display:flex;
  gap:1.5em;
}

nav ul li a{
  color:white;
  text-decoration:none;
  font-weight:500;
  transition:.3s;
}

nav ul li a:hover{
  color:#00f2fe;
}

/* Login Card */
.login-container{
  max-width:420px;
  margin:80px auto;
  padding:2.5em;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  position:relative;
  z-index:2;
  animation:fadeInUp 1s ease;
}

.login-container h2{
  text-align:center;
  margin-bottom:1.5em;
  font-weight:600;
  letter-spacing:1px;
}

/* Inputs */
.login-container input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.15);
  color:#fff;
  outline:none;
}

.login-container input::placeholder{
  color:#ddd;
}

.login-container input:focus{
  box-shadow:0 0 12px #00f2fe;
}

/* Button */
.login-container button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  color:#fff;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  transition:.4s;
  box-shadow:0 0 15px rgba(0,198,255,.6);
}

.login-container button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(0,198,255,1);
}

/* Footer */
footer{
  text-align:center;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-top:1px solid rgba(255,255,255,0.2);
  position:relative;
  z-index:2;
}

/* Animations */
@keyframes fadeInUp{
  from{transform:translateY(30px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* Responsive */
@media(max-width:500px){
  header{
    flex-direction:column;
    gap:15px;
  }
  nav ul{
    flex-direction:column;
    gap:10px;
  }
  .login-container{
    width:90%;
  }
}
</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<header>
<div class="logo">
<img src="3135715.png" alt="CS Bank Logo">
<h1>CS BANKING SERVICES</h1>
</div>

<nav>
<ul>
<li><a href="logged in.html">Home</a></li>
<li><a href="sign up.html">Sign Up</a></li>
</ul>
</nav>
</header>

<main class="login-container">
<h2>Login to Your Account</h2>
<form action="enter.html" method="GET">
<input type="text" name="username" placeholder="Username" required />
<input type="password" name="password" placeholder="Password" required />
<button type="submit">Login</button>
</form>
</main>

<footer>
<p>&copy; 2025 CS BANKING SERVICES. All rights reserved.</p>
</footer>

</body>
</html>
